name: attendance_app
description: "QR Code-based Student Attendance System"
publish_to: "none"

version: 1.0.0+1

environment:
  sdk: ^3.11.5

dependencies:
  flutter:
    sdk: flutter
  flutter_localizations:
    sdk: flutter

  # UI
  cupertino_icons: ^1.0.8
  google_fonts: ^6.2.1

  # State Management
  provider: ^6.1.2

  # HTTP Client
  dio: ^5.7.0

  # Local Storage
  shared_preferences: ^2.3.3

  # QR Scanner
  mobile_scanner: ^7.0.0

  # Connectivity
  connectivity_plus: ^6.1.3

  # Device Info (for device_id)
  device_info_plus: ^11.2.0

  # Location (GPS for geofencing)
  geolocator: ^13.0.2

  # Deep linking (QR opens app directly)
  app_links: ^6.3.3

  # Hashing for device fingerprint
  crypto: ^3.0.6

  # UUID
  uuid: ^4.5.1

  # Animations
  lottie: ^3.3.1

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^6.0.0

flutter:
  uses-material-design: true
  assets:
    - assets/images/
    - assets/animations/
