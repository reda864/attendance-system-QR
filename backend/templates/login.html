<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>PrésenceQR — Connexion</title>
  <link rel="stylesheet" href="/dashboard.css" />
</head>
<body class="login-page">
  <div class="login-card">
    <div class="nav-brand" style="margin-bottom:1.5rem">
      <div class="nav-brand-icon">📋</div>
      <div>
        <div style="font-size:1.2rem;font-weight:800">PrésenceQR</div>
        <div style="font-size:.75rem;color:var(--muted);margin-top:2px">Gestion de présence par QR</div>
      </div>
    </div>

    <h1>Bon retour</h1>
    <p class="subtitle">Connectez-vous pour accéder à votre espace</p>

    <form id="loginForm">
      <div class="field">
        <label for="email">Adresse e-mail</label>
        <input
          type="email"
          id="email"
          name="email"
          placeholder="vous@exemple.ma"
          autocomplete="email"
          required
        />
      </div>

      <div class="field">
        <label for="password">Mot de passe</label>
        <input
          type="password"
          id="password"
          name="password"
          placeholder="••••••••"
          autocomplete="current-password"
          required
        />
      </div>

      <button type="submit" class="btn" id="loginBtn">
        <span class="btn-label">Se connecter</span>
        <span class="spinner"></span>
      </button>

      <div class="alert" id="alert"></div>
    </form>

    <p style="margin-top:1.5rem;text-align:center;font-size:.8rem;color:var(--muted)">
      PrésenceQR © 2025 — Sécurisé et confidentiel
    </p>
  </div>

  <script src="/api.js"></script>
  <script src="/i18n-fr.js"></script>
  <script>
    if (API.getToken()) {
      const u = localStorage.getItem('current_user');
      if (u) {
        try {
          const user = JSON.parse(u);
          if (user.role === 'admin') window.location.href = '/admin-ui/';
          else if (user.role === 'teacher') window.location.href = '/teacher/';
          else window.location.href = '/student/';
        } catch {}
      }
    }

    const form = document.getElementById('loginForm');
    const btn = document.getElementById('loginBtn');
    const alertEl = document.getElementById('alert');

    function showAlert(msg, type = 'error') {
      alertEl.className = `alert ${type}`;
      alertEl.innerHTML = `<span>${type === 'error' ? '⚠️' : '✅'}</span><span>${msg}</span>`;
    }

    function setLoading(loading) {
      btn.disabled = loading;
      btn.classList.toggle('loading', loading);
    }

    form.addEventListener('submit', async (e) => {
      e.preventDefault();
      alertEl.className = 'alert';

      const email = document.getElementById('email').value.trim();
      const password = document.getElementById('password').value;

      if (!email || !password) {
        showAlert(t('fillBothFields'));
        return;
      }

      setLoading(true);
      try {
        const data = await API.login(email, password);
        const role = data.user?.role;
        const name = data.user?.first_name || email;
        showAlert(t('welcomeRedirect', { name }), 'success');

        setTimeout(() => {
          if (role === 'admin') window.location.href = '/admin-ui/';
          else if (role === 'teacher') window.location.href = '/teacher/';
          else window.location.href = '/student/';
        }, 600);
      } catch (err) {
        showAlert(err.message || t('invalidCredentials'));
        setLoading(false);
      }
    });
  </script>
</body>
</html>
